<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Inventory Test System</title>
        <style>
            body { background: #222; 
                color: white; 
                font-family: sans-serif; 
                display: flex; 
                flex-direction: column; 
                align-items: center; 
            }

            #weight-info { 
                font-size: 24px; 
                margin: 20px; 
            }
        
            #grid { 
                display: grid; 
                grid-template-columns: repeat(5, 60px); 
                grid-gap: 10px; 
                background: #444; 
                padding: 10px; 
                border-radius: 8px;
            }

            .slot { 
                width: 60px; height: 60px; 
                background: #666; 
                display: flex; align-items: center; justify-content: center; 
                font-size: 30px; position: relative; border-radius: 4px;
                cursor: pointer; user-select: none;
            }

            .count {
                position: absolute; bottom: 2px; right: 4px;
                font-size: 14px; color: yellow; font-weight: bold;
                background: rgba(0,0,0,0.6); padding: 0 3px; border-radius: 3px;
            }

            .buttons { 
                margin-top: 20px; 
                align-items: center; 
                justify-content: center; 
            }

            button { 
                padding: 10px 20px; 
                font-size: 16px; 
                cursor: pointer; 
                width: 30vw; 
                background-color: #666; 
                color: white; 
                font-family: sans-serif;
                border-radius: 20px;
                border: 10px solid #444;
            }
        </style>
    </head>
    <body>

        <div id="weight-info">Weight: <span id="weight-val">0</span> / 5.0 kg</div>
    
        <div id="grid"></div>

        <div class="buttons">
            <button onclick="pickUpItem('apple')">Take an apple (0.2kg)</button>
            <button onclick="pickUpItem('phone')">Take a phone (0.3kg)</button>
            <button onclick="pickUpItem('water')">Take a bottle of water(0.75kg)</button>
        </div>

    <script>
        let draggedItemIndex = null;

        const itemDataBase = {
            "apple": { name: "Яблоко", icon: "🍎", weight: 0.2, maxStack: 10 },
            "phone": { name: "Телефон", icon: "📱", weight: 0.3, maxStack: 2 },
            "water": { name: "Вода", icon: "💧", weight: 0.75, maxStack: 3 }
        };

        const max_weight = 5.0;
        let backpack = new Array(25).fill(null);

        function pickUpItem(itemKey) {
            const itemData = itemDataBase[itemKey];

            let currentTotalWeight = calculateWeight();
            if (currentTotalWeight + itemData.weight > max_weight) {
                alert("Too heavy!");
                return;
            }

            let stackSlot = -1;
            for (let i = 0; i < backpack.length; i++) {
                if (backpack[i] && backpack[i].id === itemKey && backpack[i].amount < itemData.maxStack) {
                    stackSlot = i;
                    break;
                }
            }

            if (stackSlot !== -1) {
                backpack[stackSlot].amount += 1;
            } else {
                let freeSlot = backpack.indexOf(null);
                if (freeSlot !== -1) {
                    backpack[freeSlot] = {
                        id: itemKey,
                        icon: itemData.icon,
                        weight: itemData.weight,
                        amount: 1,
                        maxStack: itemData.maxStack
                    };  
                } else {
                    alert("No space!");
                }
            }

            drawInventory();
        }

        function calculateWeight() {
            let total = 0;
            for (let item of backpack) {
                if (item) {
                    total += item.weight * item.amount;
                }
            }
            return parseFloat(total.toFixed(1));
        }

        function drawInventory() {
            const grid = document.getElementById("grid");
            grid.innerHTML = "";

            backpack.forEach((item, index) => {
                const slot = document.createElement("div");
                slot.className = "slot";
            
                slot.addEventListener('dragstart', () => draggedItemIndex = index);
                slot.ondragover = (e) => e.preventDefault();
                slot.ondrop  = (e) => {
                    e.preventDefault();
                    drop(draggedItemIndex, index);
                };

                if (item) {
                    slot.draggable = true;
                    slot.ondragstart = () => {
                        draggedItemIndex = index;
                        slot.style.opacity = "0.5";
                    };
                    slot.ondragend = () => {
                        slot.style.opacity = "1.0";
                    };

                    slot.innerHTML = `<span>${item.icon}</span>`;
                
                    if (item.amount > 1) {
                        const countTag = document.createElement("div");
                        countTag.className = "count";
                        countTag.innerText = item.amount;
                        slot.appendChild(countTag);
                    }

                    slot.onclick = () => removeItem(index);
                }
                grid.appendChild(slot);
            });

            const w = calculateWeight();
            const display = document.getElementById("weight-val");
            display.innerText = w;
            display.style.color = w >= max_weight ? "red" : (w >= max_weight * 0.8 ? "orange" : "white");
        }

        function removeItem(index) {
            if (backpack[index].amount > 1) {
                backpack[index].amount -= 1;
            } else {
                backpack[index] = null;
            }
            drawInventory();
        }
    
        function drop(SlotFrom, SlotTo) {
            if (!backpack[SlotFrom] || SlotFrom === SlotTo) return;
            if (!backpack[SlotTo]) {
                backpack[SlotTo] = backpack[SlotFrom];
                backpack[SlotFrom] = null;
            } else if (backpack[SlotFrom].id !== backpack[SlotTo].id) {
                let temporary = backpack[SlotTo];
                backpack[SlotTo] = backpack[SlotFrom];
                backpack[SlotFrom] = temporary;
            } else {
                let itemKey = backpack[SlotTo].id;
                let limit = itemDataBase[itemKey].maxStack;
                let freeSpace = limit - backpack[SlotTo].amount;
                let neededSpace = backpack[SlotFrom].amount;
                if (freeSpace >= neededSpace) {
                    backpack[SlotTo].amount += neededSpace;
                    backpack[SlotFrom] = null;
                } else {
                    backpack[SlotTo].amount = limit;
                    backpack[SlotFrom].amount -= freeSpace;
                }
            }
            drawInventory();
        }
        drawInventory();
    </script>
    </body>
</html>
